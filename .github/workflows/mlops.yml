name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'data/**.dvc'
      - 'src/**.py'
      - 'tests/**'
      - 'requirements.txt'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        run: |
          # Parse JSON tu secret CLOUD_CREDENTIALS (de tuong thich voi format bai lab)
          export AK=$(echo '${{ secrets.CLOUD_CREDENTIALS }}' | python3 -c "import sys, json; print(json.load(sys.stdin)['aws_access_key_id'])")
          export SK=$(echo '${{ secrets.CLOUD_CREDENTIALS }}' | python3 -c "import sys, json; print(json.load(sys.stdin)['aws_secret_access_key'])")
          
          # Ghi vao GITHUB_ENV de dvc va aws cli co the su dung trong cac buoc sau
          echo "AWS_ACCESS_KEY_ID=$AK" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$SK" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        #         Chi pull train_phase1.csv va eval.csv (khong can train_phase2.csv).
        run: dvc pull data/train_phase1.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        #
        # Goi y:
        #   ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
        #   echo "accuracy=$ACC" >> $GITHUB_OUTPUT
        run: |
          ACC=$(python3 -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 5: Su dung cloud SDK de upload models/model.pkl len
        #         <bucket>/models/latest/model.pkl.
        #         Ten bucket lay tu secret CLOUD_BUCKET.
        run: |
          aws s3 cp "models/model.pkl" "s3://${{ secrets.CLOUD_BUCKET }}/models/latest/model.pkl"
          echo "Model uploaded to s3://${{ secrets.CLOUD_BUCKET }}/models/latest/model.pkl"

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.70, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        #
        # Goi y:
        #   acc = float("${{ needs.train.outputs.accuracy }}")
        #   if acc < 0.70:
        #       raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
        #   print("PASSED: dang trien khai model.")
        run: |
          python3 - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print("PASSED: dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7: Restart service mlops-serve tren VM.
            # TODO 8: Cho server san sang roi goi curl /health de xac nhan.
            #         Neu health check that bai sau nhieu lan thu, thoat voi exit 1.
            #
            # Goi y:
            #   sudo systemctl restart mlops-serve
            #   sleep 5
            #   curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
            set -euo pipefail
            sudo systemctl restart mlops-serve

            # Cho service len va retry health check
            for i in $(seq 1 10); do
              if curl -sf "http://localhost:8000/health" >/dev/null; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service... attempt ${i}/10"
              sleep 3
            done

            echo "Health check failed after retries."
            exit 1
